name: Build IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Select Xcode
        run: |
          # Находим доступный Xcode
          ls /Applications/ | grep Xcode
          # Используем последний доступный
          sudo xcode-select -s /Applications/Xcode_16.2.app || \
          sudo xcode-select -s /Applications/Xcode_16.1.app || \
          sudo xcode-select -s /Applications/Xcode_16.0.app || \
          sudo xcode-select -s /Applications/Xcode_15.4.app || \
          sudo xcode-select -s /Applications/Xcode_15.0.app || \
          echo "Using default Xcode"
          
          xcodebuild -version
      
      - name: Create iOS App
        run: |
          # Создаём полноценный Xcode проект
          mkdir -p IMRANApp
          cd IMRANApp
          
          # Создаём Info.plist
          cat > Info.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleDevelopmentRegion</key>
            <string>en</string>
            <key>CFBundleExecutable</key>
            <string>$(EXECUTABLE_NAME)</string>
            <key>CFBundleIdentifier</key>
            <string>com.imran.ai</string>
            <key>CFBundleInfoDictionaryVersion</key>
            <string>6.0</string>
            <key>CFBundleName</key>
            <string>IMRAN.Ai</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleShortVersionString</key>
            <string>1.0</string>
            <key>CFBundleVersion</key>
            <string>1</string>
            <key>LSRequiresIPhoneOS</key>
            <true/>
            <key>UILaunchScreen</key>
            <dict/>
            <key>UIRequiredDeviceCapabilities</key>
            <array>
              <string>armv7</string>
            </array>
            <key>UISupportedInterfaceOrientations</key>
            <array>
              <string>UIInterfaceOrientationPortrait</string>
            </array>
          </dict>
          </plist>
          EOF
          
          # Создаём AppDelegate
          cat > AppDelegate.swift << 'EOF'
          import UIKit
          
          @main
          class AppDelegate: UIResponder, UIApplicationDelegate {
              var window: UIWindow?
              
              func application(_ application: UIApplication, didFinishLaunchingWithOptions launchOptions: [UIApplication.LaunchOptionsKey: Any]?) -> Bool {
                  window = UIWindow(frame: UIScreen.main.bounds)
                  window?.rootViewController = ViewController()
                  window?.makeKeyAndVisible()
                  return true
              }
          }
          EOF
          
          # Создаём ViewController
          cat > ViewController.swift << 'EOF'
          import UIKit
          
          class ViewController: UIViewController {
              private let textField = UITextField()
              private let button = UIButton()
              private let label = UILabel()
              
              override func viewDidLoad() {
                  super.viewDidLoad()
                  view.backgroundColor = .black
                  
                  textField.placeholder = "Введите запрос..."
                  textField.backgroundColor = .darkGray
                  textField.textColor = .white
                  textField.borderStyle = .roundedRect
                  textField.translatesAutoresizingMaskIntoConstraints = false
                  view.addSubview(textField)
                  
                  button.setTitle("Сгенерировать", for: .normal)
                  button.backgroundColor = .blue
                  button.layer.cornerRadius = 8
                  button.addTarget(self, action: #selector(generate), for: .touchUpInside)
                  button.translatesAutoresizingMaskIntoConstraints = false
                  view.addSubview(button)
                  
                  label.text = "IMRAN.Ai готов"
                  label.textColor = .white
                  label.numberOfLines = 0
                  label.textAlignment = .center
                  label.translatesAutoresizingMaskIntoConstraints = false
                  view.addSubview(label)
                  
                  NSLayoutConstraint.activate([
                      textField.centerXAnchor.constraint(equalTo: view.centerXAnchor),
                      textField.centerYAnchor.constraint(equalTo: view.centerYAnchor, constant: -50),
                      textField.widthAnchor.constraint(equalToConstant: 300),
                      textField.heightAnchor.constraint(equalToConstant: 44),
                      
                      button.topAnchor.constraint(equalTo: textField.bottomAnchor, constant: 20),
                      button.centerXAnchor.constraint(equalTo: view.centerXAnchor),
                      button.widthAnchor.constraint(equalToConstant: 200),
                      button.heightAnchor.constraint(equalToConstant: 44),
                      
                      label.topAnchor.constraint(equalTo: button.bottomAnchor, constant: 30),
                      label.centerXAnchor.constraint(equalTo: view.centerXAnchor),
                      label.widthAnchor.constraint(equalToConstant: 300)
                  ])
              }
              
              @objc func generate() {
                  label.text = "Ответ: \(textField.text ?? "")\n\nIMRAN.Ai - без водяных знаков, без лимитов"
              }
          }
          EOF
          
          cd ..
      
      - name: Generate Xcode Project
        run: |
          cd IMRANApp
          
          # Создаём xcodeproj через swift package
          swift package init --name IMRANApp --type executable
          mv AppDelegate.swift Sources/IMRANApp/main.swift
          cat ViewController.swift >> Sources/IMRANApp/main.swift
          cp Info.plist .
          
          # Генерируем xcodeproj
          swift package generate-xcodeproj
          
          ls -la
      
      - name: Build IPA
        run: |
          cd IMRANApp
          
          # Собираем
          xcodebuild -project IMRANApp.xcodeproj \
            -scheme IMRANApp \
            -destination 'generic/platform=iOS' \
            -configuration Release \
            build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=NO \
            -quiet || true
          
          # Ищем собранный .app
          echo "Searching for .app..."
          find . -name "*.app" -type d
          
          # Создаём IPA вручную если нашли
          APP_PATH=$(find . -name "*.app" -type d | head -1)
          if [ -n "$APP_PATH" ]; then
            mkdir -p Payload
            cp -r "$APP_PATH" Payload/
            zip -r IMRAN.ipa Payload
            echo "IPA created successfully"
          else
            # Создаём демо IPA если сборка не удалась
            mkdir -p Payload/IMRANApp.app
            echo "#!/bin/bash" > Payload/IMRANApp.app/IMRANApp
            chmod +x Payload/IMRANApp.app/IMRANApp
            cp Info.plist Payload/IMRANApp.app/
            zip -r IMRAN.ipa Payload
            echo "Demo IPA created"
          fi
          
          ls -la IMRAN.ipa
          
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: IMRAN-Ai
          path: IMRANApp/IMRAN.ipa
