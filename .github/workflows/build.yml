name: Build IPA

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app
      
      - name: Create Xcode project
        run: |
          mkdir IMRANApp
          cd IMRANApp
          echo '<?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleDevelopmentRegion</key>
            <string>en</string>
            <key>CFBundleExecutable</key>
            <string>$(EXECUTABLE_NAME)</string>
            <key>CFBundleIdentifier</key>
            <string>com.imran.ai</string>
            <key>CFBundleInfoDictionaryVersion</key>
            <string>6.0</string>
            <key>CFBundleName</key>
            <string>IMRAN.Ai</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleShortVersionString</key>
            <string>1.0</string>
            <key>CFBundleVersion</key>
            <string>1</string>
            <key>LSRequiresIPhoneOS</key>
            <true/>
            <key>UIApplicationSceneManifest</key>
            <dict>
              <key>UIApplicationSupportsMultipleScenes</key>
              <false/>
            </dict>
            <key>UILaunchScreen</key>
            <dict/>
            <key>UIRequiredDeviceCapabilities</key>
            <array>
              <string>armv7</string>
            </array>
            <key>UISupportedInterfaceOrientations</key>
            <array>
              <string>UIInterfaceOrientationPortrait</string>
            </array>
            <key>NSPhotoLibraryAddUsageDescription</key>
            <string>Save generated images and videos</string>
          </dict>
          </plist>' > Info.plist
          
          echo 'import SwiftUI
          
          @main
          struct IMRANApp: App {
              var body: some Scene {
                  WindowGroup {
                      ContentView()
                  }
              }
          }' > IMRANApp.swift
          
          cp ../IMRANApp.swift ContentView.swift 2>/dev/null || cat ../IMRANApp.swift > ContentView.swift
      
      - name: Build and export IPA
        run: |
          cd IMRANApp
          xcodebuild -version
          xcodebuild -list
          
          # Создаём временную подпись для сборки
          mkdir -p build
          echo "CODE_SIGNING_ALLOWED=NO" > build.xcconfig
          
          xcodebuild -project IMRANApp.xcodeproj -scheme IMRANApp -destination 'generic/platform=iOS' -configuration Release build CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO
          
          # Создаём Payload и IPA
          mkdir Payload
          cp -r build/Release-iphoneos/IMRANApp.app Payload/
          zip -r IMRAN.ipa Payload
      
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: IMRAN-Ai
          path: IMRANApp/IMRAN.ipa
